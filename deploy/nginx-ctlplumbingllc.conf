# PlumbPrice — app.ctlplumbingllc.com
# Cloudflare terminates public SSL; this server handles Cloudflare→origin SSL on 443
# and HTTP on 80 (Cloudflare always upgrades visitors to HTTPS)

# Direct Tailscale/LAN access — no SSL redirect, proxy straight to plumbprice
server {
    listen 80 default_server;
    server_name _ 100.83.120.32 192.168.1.231;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# Domain names — redirect HTTP to HTTPS (Cloudflare handles public SSL)
server {
    listen 80;
    server_name app.ctlplumbingllc.com ctlplumbingllc.com www.ctlplumbingllc.com;
    return 301 https://$host$request_uri;
}

server {
    listen 192.168.1.231:443 ssl;
    listen 127.0.0.1:443 ssl;
    http2 on;
    server_name app.ctlplumbingllc.com ctlplumbingllc.com www.ctlplumbingllc.com;

    ssl_certificate     /etc/ssl/certs/ctlplumbingllc-origin.crt;
    ssl_certificate_key /etc/ssl/private/ctlplumbingllc-origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
