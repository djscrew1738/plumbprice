name: Test Coverage & Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: plumbprice
          POSTGRES_PASSWORD: plumbprice_dev
          POSTGRES_DB: plumbprice
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U plumbprice" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://plumbprice:plumbprice_dev@localhost:5432/plumbprice
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-do-not-use-in-prod
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'api/requirements.txt'

      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run alembic migrations
        run: cd api && alembic upgrade head

      - name: Run API tests with coverage
        run: |
          cd api
          pytest \
            --ignore=tests/eval \
            --ignore=tests/test_admin_worker_ops.py \
            --ignore=tests/services/test_classifier.py \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=30 \
            --junitxml=../test-results.xml

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage-report
          path: |
            api/htmlcov/
            api/coverage.xml
          retention-days: 30

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type-check
        run: cd web && npx tsc --noEmit

      - name: Run vitest with coverage
        run: cd web && npx vitest run --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: web/coverage/
          retention-days: 30

