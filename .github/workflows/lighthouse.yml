name: Lighthouse CI

# Performance budget watchdog (a5-perf-budget). Runs Lighthouse against
# the public home + login pages and asserts soft budgets for perf,
# bundle size, and core web vitals. All assertions are "warn" — this
# job will surface regressions without blocking PRs while we tune.
# Flip to "error" once budgets are stable for 2-3 weeks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1

      - name: Install Lighthouse CI
        run: npm install --no-save @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        run: npx lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: web/.lighthouseci/
          retention-days: 14
