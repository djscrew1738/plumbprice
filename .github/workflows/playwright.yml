name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        ports: ['9000:9000']
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # Caching
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
          if [ -f worker/requirements.txt ]; then pip install -r worker/requirements.txt || true; fi
          pip install alembic || true

      - name: Install web dependencies and Playwright
        working-directory: web
        run: |
          npm ci
          npx --yes playwright install-deps || true
          npx --yes playwright install --with-deps

      - name: Wait for backing services
        run: |
          for i in $(seq 1 60); do
            nc -z 127.0.0.1 5432 && nc -z 127.0.0.1 6379 && nc -z 127.0.0.1 9000 && break || sleep 1
          done

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: |
          source .venv/bin/activate
          export PYTHONPATH=${GITHUB_WORKSPACE}
          cd api || exit 0
          alembic upgrade head || echo "alembic may be configured differently; ensure migrations are applied"

      - name: Seed DB (development fixtures)
        run: |
          source .venv/bin/activate
          export PYTHONPATH=${GITHUB_WORKSPACE}
          cd api || exit 0
          if [ -f app/scripts/seed.py ] || [ -f app/scripts/seed_db.py ] || [ -f app/scripts/seed ]; then
            python -m app.scripts.seed || python -m app.scripts.seed_db || echo "No seed script found or seed failed"
          else
            echo "No seed script present"
          fi

      - name: Start API and worker (background)
        run: |
          source .venv/bin/activate
          export PYTHONPATH=${GITHUB_WORKSPACE}
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > api.log 2>&1 &
          nohup celery -A worker worker --loglevel=info --concurrency=1 > worker.log 2>&1 &
          npx --yes wait-on http://localhost:8000 -t 120000

      - name: Build and Start web
        run: |
          cd web
          npm run build
          # If Next.js standalone output exists, run the standalone server. Otherwise use next start
          if [ -f .next/standalone/server.js ]; then
            NODE_ENV=production NODE_OPTIONS=--max_old_space_size=2048 nohup node .next/standalone/server.js > ../web/web.log 2>&1 &
          else
            NEXT_PUBLIC_API_URL=http://localhost:8000 nohup npm run start > ../web/web.log 2>&1 &
          fi
          npx --yes wait-on http://127.0.0.1:3000 http://localhost:3000 -t 120000

      - name: Run Playwright tests
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          # Run Playwright, produce HTML report with traces/videos on failures
          npx --yes playwright test --reporter=list --reporter=html || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report

      - name: Upload Playwright traces & videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-videos
          path: |
            web/playwright-report/data/**
            web/playwright-report/videos/**
            web/test-results/**

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            api.log
            worker.log
            web/web.log

