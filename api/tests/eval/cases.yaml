# PlumbPrice AI Regression Eval — Locked Golden Set
#
# Each case represents a real-world DFW plumbing inquiry with the
# expected classification outcome.  These cases must continue to pass
# after every model swap, prompt change, or pricing-engine refactor.
#
# Schema:
#   id             : stable identifier (do not rename)
#   message        : natural-language prompt fed to /api/v1/chat/price
#   expect:
#     task_code    : exact code (or list of acceptable alternates)
#     county       : Dallas | Tarrant | Collin | Denton | Rockwall | Parker | Kaufman
#     min_price    : grand_total floor (USD) — inclusive
#     max_price    : grand_total ceiling (USD) — inclusive
#     min_confidence : minimum classification confidence (0.0–1.0)
#     quantity     : (optional) expected detected quantity
#
# Tolerances are intentionally wide; tighten only after a stable run of
# 10 consecutive green CI builds.

cases:
  - id: water_heater_50g_gas_dallas
    message: "How much to install a 50 gallon gas water heater in Dallas?"
    expect:
      task_code: [WH_50G_GAS_STANDARD, WH_50G_GAS_ATTIC]
      county: Dallas
      min_price: 1400
      max_price: 2400
      min_confidence: 0.6

  - id: water_heater_tankless_plano
    message: "Need a tankless gas water heater installed in Plano, second floor."
    expect:
      task_code: [WH_TANKLESS_GAS]
