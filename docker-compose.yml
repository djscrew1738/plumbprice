services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: plumbprice_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plumbprice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plumbprice_dev}
      POSTGRES_DB: ${POSTGRES_DB:-plumbprice}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plumbprice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net

  redis:
    image: redis:7-alpine
    container_name: plumbprice_redis
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net

  minio:
    image: minio/minio:latest
    container_name: plumbprice_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9005:9000"
      - "9006:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: plumbprice-backend:latest
    container_name: plumbprice_api
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-plumbprice}:${POSTGRES_PASSWORD:-plumbprice_dev}@postgres:5432/${POSTGRES_DB:-plumbprice}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PYTHONPATH=/app/api
      - HERMES_ENDPOINT_URL=${HERMES_ENDPOINT_URL:-http://localhost:11434/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:3200","https://pricing.ctlplumbingllc.com"]}
    ports:
      - "${API_PORT:-8201}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net
    volumes:
      - .:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://pricing.ctlplumbingllc.com}
    container_name: plumbprice_web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://pricing.ctlplumbingllc.com}
      - HOSTNAME=0.0.0.0
    ports:
      - "${WEB_PORT:-3201}:3000"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net

  worker:
    image: plumbprice-backend:latest
    container_name: plumbprice_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-plumbprice}:${POSTGRES_PASSWORD:-plumbprice_dev}@postgres:5432/${POSTGRES_DB:-plumbprice}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PYTHONPATH=/app/api
      - HERMES_ENDPOINT_URL=${HERMES_ENDPOINT_URL:-http://localhost:11434/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.worker worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - plumbprice-net
    volumes:
      - .:/app

networks:
  plumbprice-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
